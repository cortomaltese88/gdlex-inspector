<?xml version="1.0" encoding="UTF-8"?>
<!--
  gdlex-inspector icon
  SPDX-License-Identifier: GPL-3.0-or-later
  Copyright (C) STUDIO GD LEX

  Matrix-style disk inspector icon:
  - Dark background with Matrix green columns
  - Magnifying glass / radar crosshair overlay
  - Highlighted data trace
  - Readable at 32×32, 64×64, 256×256
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-label="GD LEX Inspector">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f0d"/>
      <stop offset="100%" stop-color="#050a05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>

  <!-- Matrix vertical code columns (faint) -->
  <g opacity="0.18" fill="#00ff41" font-family="monospace" font-size="5">
    <text x="4"  y="10">1</text><text x="4"  y="17">0</text><text x="4"  y="24">1</text>
    <text x="4"  y="31">1</text><text x="4"  y="38">0</text><text x="4"  y="45">0</text>
    <text x="12" y="7" >0</text><text x="12" y="14">1</text><text x="12" y="21">0</text>
    <text x="12" y="28">1</text><text x="12" y="35">1</text><text x="12" y="42">0</text>
    <text x="12" y="49">1</text>
    <text x="48" y="14">1</text><text x="48" y="21">0</text><text x="48" y="28">0</text>
    <text x="48" y="35">1</text><text x="48" y="42">1</text><text x="48" y="49">0</text>
    <text x="56" y="10">0</text><text x="56" y="17">1</text><text x="56" y="24">1</text>
    <text x="56" y="31">0</text><text x="56" y="38">0</text><text x="56" y="45">1</text>
    <text x="56" y="52">1</text>
  </g>

  <!-- Disk cylinder (subtle, background) -->
  <ellipse cx="32" cy="20" rx="12" ry="4" fill="none" stroke="#1a5c1a" stroke-width="1.2" opacity="0.6"/>
  <rect x="20" y="20" width="24" height="12" fill="none" stroke="#1a5c1a" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="32" cy="32" rx="12" ry="4" fill="none" stroke="#1a5c1a" stroke-width="1.2" opacity="0.6"/>

  <!-- Highlighted data trace on disk -->
  <path d="M 22 24 Q 32 21 42 26" stroke="#00ff41" stroke-width="1.5" fill="none"
        opacity="0.85" filter="url(#glow)"/>

  <!-- Magnifying glass -->
  <circle cx="29" cy="30" r="11" fill="none" stroke="#00ff41" stroke-width="2.2"
          filter="url(#glow)"/>
  <!-- Crosshair inside lens -->
  <line x1="29" y1="23" x2="29" y2="37" stroke="#00ff41" stroke-width="0.8" opacity="0.5"/>
  <line x1="22" y1="30" x2="36" y2="30" stroke="#00ff41" stroke-width="0.8" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="29" cy="30" r="2" fill="#39ff14" filter="url(#glow)"/>
  <!-- Handle -->
  <line x1="37.5" y1="38.5" x2="44" y2="46" stroke="#00ff41" stroke-width="3"
        stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="44" cy="46" r="1.5" fill="#39ff14"/>
</svg>
